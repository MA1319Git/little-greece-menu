<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Mussel shell - outer shell -->
  <ellipse cx="40" cy="45" rx="28" ry="22" fill="#4a3728" transform="rotate(-20 40 45)"/>
  <!-- Shell highlight / second valve -->
  <ellipse cx="40" cy="43" rx="24" ry="18" fill="#7a5c42" transform="rotate(-20 40 43)"/>
  <!-- Shell inner glow -->
  <ellipse cx="40" cy="41" rx="18" ry="13" fill="#a07856" transform="rotate(-20 40 41)"/>
  <!-- Shell line details -->
  <path d="M18 38 Q40 22 62 38" stroke="#3a2820" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M20 43 Q40 28 60 43" stroke="#3a2820" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M21 48 Q40 34 59 48" stroke="#3a2820" stroke-width="0.7" fill="none" opacity="0.3"/>
  <!-- Mussel body (orange/yellow flesh visible at top) -->
  <ellipse cx="40" cy="30" rx="10" ry="6" fill="#e8a050" opacity="0.9"/>
  <ellipse cx="40" cy="29" rx="7" ry="4" fill="#f0c070" opacity="0.8"/>
  <!-- Shell tip -->
  <ellipse cx="24" cy="52" rx="5" ry="4" fill="#3a2820" transform="rotate(-20 24 52)"/>
</svg>
